<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Natee Color Picker</title>
    <link rel="stylesheet" href="popup.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
  </head>
  <body>
    <main class="popup-root">
      <header class="popup-header">
        <h1 class="popup-title">Color Picker</h1>
      </header>

      <section class="picker-section">
        <label class="field-label" for="color-input">Color</label>
        <div class="color-row">
          <input id="color-input" type="color" class="color-input" />
          <button id="eyedropper-btn" class="btn secondary" type="button">
            Eyedropper
          </button>
        </div>
        <p id="eyedropper-support" class="eyedropper-support"></p>
      </section>

      <section class="preview-section">
        <div id="color-preview" class="color-preview"></div>
        <div class="value-column">
          <label class="field-label" for="format-select">Format</label>
          <select id="format-select" class="select">
            <option value="hex">HEX</option>
            <option value="rgb">RGB</option>
            <option value="hsl">HSL</option>
          </select>
          <label class="field-label" for="color-value">Color value</label>
          <div class="value-row">
            <input
              id="color-value"
              class="value-input"
              type="text"
              readonly
              placeholder="Select or pick a color"
              title="Click to copy"
              aria-label="Color value, click to copy"
            />
            <button id="copy-btn" class="btn primary" type="button" aria-label="Copy color value">
              <span class="btn-icon" aria-hidden="true">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
                  <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
                </svg>
              </span>
              Copy
            </button>
          </div>
          <span id="copy-status" class="copy-status" aria-live="polite"></span>
        </div>
      </section>

      <section class="tech-section">
        <h2 class="tech-section-title">Page technology</h2>
        <p id="tech-status" class="tech-status" aria-live="polite">Analyzing…</p>
        <ul id="tech-list" class="tech-list" aria-label="Detected technologies" hidden></ul>
      </section>
    </main>

    <script type="module" src="../../dist/popup/popup.js"></script>
  </body>
</html>
